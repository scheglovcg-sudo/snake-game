<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Змейка</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; touch-action:none; }

body {
  background:#0a0f1e;
  color:#e2e8f0;
  font-family: 'Segoe UI', Arial, sans-serif;
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  overflow:hidden;
  user-select:none;
}

.header {
  width:100%;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 16px 6px;
  flex-shrink:0;
}

.logo {
  font-size:18px;
  font-weight:800;
  color:#00ff9d;
  letter-spacing:2px;
  text-shadow:0 0 14px rgba(0,255,157,0.5);
}

.scores { display:flex; gap:8px; }

.score-box {
  background:#1a2235;
  border:1px solid #1e3a5f;
  border-radius:8px;
  padding:4px 12px;
  text-align:center;
  min-width:60px;
}
.score-label { font-size:9px; color:#64748b; text-transform:uppercase; letter-spacing:1px; }
.score-val { font-size:18px; font-weight:700; color:#00ff9d; line-height:1.2; }
.score-val.blue { color:#00ccff; }

.canvas-wrap { position:relative; padding:0 10px; flex-shrink:0; }

canvas { display:block; border-radius:10px; border:1.5px solid #1e3a5f; box-shadow:0 0 30px rgba(0,0,0,0.7); }

/* OVERLAY */
.overlay {
  position:absolute;
  top:0; left:10px; right:10px; bottom:0;
  background:rgba(10,15,30,0.93);
  border-radius:10px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:8px;
  z-index:10;
}
.overlay.hidden { display:none; }

.ov-icon { font-size:46px; }
.ov-title { font-size:22px; font-weight:800; color:#00ff9d; text-shadow:0 0 16px rgba(0,255,157,0.5); letter-spacing:2px; }
.ov-sub { font-size:12px; color:#64748b; text-align:center; padding:0 20px; line-height:1.6; }
.ov-score { font-size:40px; font-weight:900; color:#00ff9d; text-shadow:0 0 20px rgba(0,255,157,0.5); }
.ov-best { font-size:13px; color:#00ccff; }
.ov-lvl { font-size:11px; color:#ff9d00; margin-top:2px; }

.btn {
  background:linear-gradient(135deg,#00ff9d,#00ccff);
  color:#0a0f1e;
  border:none;
  border-radius:10px;
  padding:12px 36px;
  font-size:15px;
  font-weight:800;
  cursor:pointer;
  margin-top:6px;
  letter-spacing:1px;
  box-shadow:0 4px 20px rgba(0,255,157,0.3);
  transition:transform 0.1s;
}
.btn:active { transform:scale(0.95); }

.btn2 {
  background:#1a2235;
  color:#00ff9d;
  border:1.5px solid #00ff9d;
  border-radius:10px;
  padding:10px 28px;
  font-size:13px;
  font-weight:700;
  cursor:pointer;
  letter-spacing:1px;
  transition:transform 0.1s;
}
.btn2:active { transform:scale(0.95); }

/* STATS */
.stats { display:flex; gap:6px; width:100%; padding:6px 10px 4px; flex-shrink:0; }

.stat {
  flex:1;
  background:#1a2235;
  border:1px solid #1e3a5f;
  border-radius:7px;
  padding:5px 8px;
  text-align:center;
  font-size:11px;
  color:#64748b;
}
.stat b { display:block; font-size:14px; color:#e2e8f0; font-weight:700; }

/* DPAD */
.dpad {
  display:grid;
  grid-template-columns:64px 64px 64px;
  grid-template-rows:64px 64px 64px;
  gap:3px;
  padding:8px 0 4px;
  flex-shrink:0;
}

.db {
  background:#1a2235;
  border:1.5px solid #1e3a5f;
  border-radius:12px;
  display:flex; align-items:center; justify-content:center;
  font-size:24px; cursor:pointer; color:#00ff9d;
  transition:all 0.08s;
}
.db:active { background:#243048; border-color:#00ff9d; box-shadow:0 0 12px rgba(0,255,157,0.3); transform:scale(0.92); }

.dc {
  background:#1a2235;
  border:1.5px solid #1e3a5f;
  border-radius:12px;
  display:flex; align-items:center; justify-content:center;
  font-size:20px; cursor:pointer; color:#64748b;
  transition:all 0.08s;
}
.dc:active { transform:scale(0.92); }

/* JOYSTICK */
.joystick-wrap {
  width:198px; height:198px;
  position:relative;
  display:none;
  flex-shrink:0;
  margin:8px 0 4px;
}
.joystick-base {
  position:absolute; inset:0; border-radius:50%;
  background:radial-gradient(circle, #1a2235 60%, #111827 100%);
  border:2px solid #1e3a5f;
  box-shadow:0 0 20px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,0,0,0.3);
}
.joystick-stick {
  position:absolute;
  width:64px; height:64px; border-radius:50%;
  background:radial-gradient(circle at 35% 35%, #2a3f5f, #0d1929);
  border:2px solid #00ff9d;
  box-shadow:0 0 14px rgba(0,255,157,0.4);
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  cursor:pointer;
}

/* BOTTOM BAR */
.bottom-bar {
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  padding:4px 10px 12px;
  flex-shrink:0;
  width:100%;
}

.ctrl-toggle {
  display:flex;
  background:#1a2235;
  border:1px solid #1e3a5f;
  border-radius:8px;
  overflow:hidden;
}
.toggle-btn {
  padding:7px 14px;
  font-size:11px; font-weight:700;
  color:#64748b; cursor:pointer;
  border:none; background:transparent;
  transition:all 0.15s;
}
.toggle-btn.active { background:#243048; color:#00ff9d; }

.lb-open-btn {
  background:#1a2235;
  border:1px solid #1e3a5f;
  border-radius:8px;
  padding:7px 16px;
  font-size:12px; font-weight:700;
  color:#00ccff; cursor:pointer;
  transition:all 0.1s;
}
.lb-open-btn:active { transform:scale(0.95); border-color:#00ccff; }

/* NICKNAME SCREEN */
.nick-screen {
  position:fixed; inset:0;
  background:#0a0f1e;
  z-index:100;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:14px; padding:30px;
}
.nick-screen.hidden { display:none; }
.nick-title { font-size:22px; font-weight:800; color:#00ff9d; letter-spacing:2px; text-shadow:0 0 16px rgba(0,255,157,0.4); }
.nick-sub { font-size:13px; color:#64748b; text-align:center; }
.nick-input {
  background:#1a2235;
  border:1.5px solid #1e3a5f;
  border-radius:10px;
  color:#e2e8f0;
  font-size:16px; font-weight:600;
  padding:12px 18px;
  width:100%; max-width:300px;
  text-align:center;
  outline:none;
  transition:border-color 0.2s;
  touch-action:auto;
}
.nick-input:focus { border-color:#00ff9d; }

/* LEADERBOARD */
.lb-overlay {
  position:fixed; inset:0;
  background:rgba(10,15,30,0.97);
  z-index:50;
  display:flex; flex-direction:column;
  align-items:center;
  padding:20px 16px 16px;
  overflow-y:auto;
}
.lb-overlay.hidden { display:none; }
.lb-title { font-size:18px; font-weight:800; color:#00ff9d; letter-spacing:2px; margin-bottom:14px; text-shadow:0 0 14px rgba(0,255,157,0.4); }
.lb-list { width:100%; max-width:380px; display:flex; flex-direction:column; gap:6px; margin-bottom:16px; }
.lb-item { display:flex; align-items:center; gap:10px; background:#1a2235; border:1px solid #1e3a5f; border-radius:10px; padding:10px 14px; }
.lb-rank { font-size:16px; min-width:28px; text-align:center; }
.lb-name { flex:1; font-size:13px; font-weight:700; color:#e2e8f0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.lb-score { font-size:15px; font-weight:800; color:#00ff9d; }
.lb-meta { font-size:10px; color:#ff9d00; min-width:36px; text-align:right; }
.lb-you { border-color:#00ff9d44; background:#1a2a35; }
.lb-loading { color:#64748b; font-size:13px; margin:30px 0; text-align:center; }

/* LEVEL ANNOUNCE */
.lvl-announce {
  position:fixed; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  background:rgba(10,15,30,0.88);
  z-index:30; pointer-events:none;
  opacity:0; transition:opacity 0.4s;
}
.lvl-announce.show { opacity:1; }
.lvl-ann-title { font-size:28px; font-weight:900; color:#00ff9d; text-shadow:0 0 30px rgba(0,255,157,0.6); letter-spacing:2px; }
.lvl-ann-sub { font-size:14px; color:#e2e8f0; margin-top:8px; text-align:center; padding:0 30px; }

/* PROGRESS BAR */
.progress-wrap { width:100%; padding:2px 10px 0; flex-shrink:0; }
.progress-bg { background:#1a2235; border-radius:4px; height:5px; width:100%; overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg,#00ff9d,#00ccff); border-radius:4px; transition:width 0.3s; }

/* NOTIFICATION */
.notif {
  position:fixed; top:60px; left:50%;
  transform:translateX(-50%) translateY(-10px);
  background:#1a2235; border:1px solid #00ff9d;
  color:#00ff9d; font-size:12px; font-weight:700;
  padding:8px 18px; border-radius:8px;
  opacity:0; pointer-events:none;
  transition:all 0.3s; white-space:nowrap;
  z-index:99; letter-spacing:1px;
}
.notif.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* SVG icons */
.ico { display:inline-block; vertical-align:middle; flex-shrink:0; }
</style>
</head>

var fbApp = initializeApp(firebaseConfig);
var db = getFirestore(fbApp);

// ---- Player ID & Nickname ----
// Unique player ID stored locally
var playerId = localStorage.getItem('snakePlayerId');
if (!playerId) {
  playerId = 'p_' + Date.now() + '_' + Math.floor(Math.random()*99999);
  localStorage.setItem('snakePlayerId', playerId);
}

var playerName = localStorage.getItem('snakePlayerName');

// Show nickname screen if no name saved
var nickScreen = document.getElementById('nickScreen');
if (!playerName) {
  nickScreen.classList.remove('hidden');
} else {
  nickScreen.classList.add('hidden');
}

document.getElementById('nickBtn').onclick = function() {
  var val = document.getElementById('nickInput').value.trim();
  if (!val) { notify('Введи имя!'); return; }
  playerName = val;
  localStorage.setItem('snakePlayerName', playerName);
  nickScreen.classList.add('hidden');
};

document.getElementById('nickInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('nickBtn').click();
});

// ---- Canvas ----
var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var GRID = 20;
var CELL = 16;

function setupCanvas() {
  var maxW = canvas.parentElement.clientWidth - 20;
  var maxH = window.innerHeight
    - document.querySelector('.header').offsetHeight
    - document.querySelector('.stats').offsetHeight
    - document.querySelector('.progress-wrap').offsetHeight
    - 230;
  var size = Math.min(maxW, maxH, 380);
  CELL = Math.floor(size / GRID);
  canvas.width  = CELL * GRID;
  canvas.height = CELL * GRID;
}
setupCanvas();

// ---- Constants ----
var TOTAL_CELLS = GRID * GRID; // 400
var LEVEL_TARGET = 75; // snake length to complete level

// Wall layouts per level (0-indexed, level 1 = index 0 = no walls)
// Each entry is array of {x,y} segments
var WALL_PATTERNS = [
  // Level 1: no walls
  [],
  // Level 2: short cross in center
  (function() {
    var w = []; var cx = 10, cy = 10;
    for (var i=-2;i<=2;i++) { w.push({x:cx+i,y:cy}); w.push({x:cx,y:cy+i}); }
    return w;
  })(),
  // Level 3: four corner blocks
  (function() {
    var w = [];
    var corners = [{x:3,y:3},{x:16,y:3},{x:3,y:16},{x:16,y:16}];
    corners.forEach(function(c) {
      for (var dx=0;dx<3;dx++) for(var dy=0;dy<3;dy++) w.push({x:c.x+dx,y:c.y+dy});
    });
    return w;
  })(),
  // Level 4: two horizontal bars
  (function() {
    var w = [];
    for (var i=4;i<=15;i++) { w.push({x:i,y:6}); w.push({x:i,y:13}); }
    return w;
  })(),
  // Level 5: maze-like inner walls
  (function() {
    var w = [];
    for (var i=3;i<=8;i++) w.push({x:i,y:5});
    for (var i=5;i<=10;i++) w.push({x:3,y:i});
    for (var i=11;i<=16;i++) w.push({x:i,y:14});
    for (var i=9;i<=14;i++) w.push({x:16,y:i});
    return w;
  })(),
  // Level 6: spiral-ish
  (function() {
    var w = [];
    for (var i=2;i<=17;i++) w.push({x:i,y:2});
    for (var i=2;i<=15;i++) w.push({x:17,y:i});
    for (var i=4;i<=17;i++) w.push({x:i,y:17});
    for (var i=4;i<=17;i++) w.push({x:2,y:i});
    for (var i=5;i<=14;i++) w.push({x:i,y:5});
    for (var i=5;i<=12;i++) w.push({x:14,y:i});
    return w;
  })(),
  // Level 7: checkerboard blocks
  (function() {
    var w = [];
    var pts = [{x:4,y:4},{x:4,y:10},{x:4,y:15},{x:10,y:7},{x:10,y:14},{x:15,y:4},{x:15,y:10}];
    pts.forEach(function(p){ for(var dx=0;dx<2;dx++) for(var dy=0;dy<2;dy++) w.push({x:p.x+dx,y:p.y+dy}); });
    return w;
  })(),
  // Level 8: complex maze
  (function() {
    var w = [];
    for(var i=1;i<=18;i++) w.push({x:i,y:1},{x:i,y:18});
    for(var i=1;i<=18;i++) w.push({x:1,y:i},{x:18,y:i});
    for(var i=4;i<=15;i++) w.push({x:i,y:9});
    for(var i=4;i<=9;i++) w.push({x:4,y:i});
    for(var i=10;i<=15;i++) w.push({x:15,y:i});
    return w;
  })(),
  // Level 9: dense obstacles
  (function() {
    var w = [];
    var pts = [{x:5,y:5},{x:5,y:10},{x:5,y:15},{x:10,y:3},{x:10,y:10},{x:10,y:17},{x:15,y:5},{x:15,y:10},{x:15,y:15}];
    pts.forEach(function(p){ for(var dx=0;dx<2;dx++) for(var dy=0;dy<2;dy++) w.push({x:p.x+dx,y:p.y+dy}); });
    for(var i=3;i<=17;i++) { if(i!==10) w.push({x:i,y:1},{x:i,y:18},{x:1,y:i},{x:18,y:i}); }
    return w;
  })(),
  // Level 10: hardest — full border + inner cross
  (function() {
    var w = [];
    for(var i=0;i<20;i++) { w.push({x:i,y:0}); w.push({x:i,y:19}); w.push({x:0,y:i}); w.push({x:19,y:i}); }
    for(var i=3;i<=16;i++) { w.push({x:i,y:9}); w.push({x:9,y:i}); }
    return w;
  })()
];

// ---- Game State ----
var snake, dir, nextDir, food, badApple, walls;
var score, bestScore, foodCount, level, paused, running, loopId;
var pulse = 0;
var tx = 0, ty = 0;

bestScore = parseInt(localStorage.getItem('snakeBest') || '0');
document.getElementById('best').textContent = bestScore;

function getWalls(lvl) {
  var idx = Math.min(lvl - 1, WALL_PATTERNS.length - 1);
  return WALL_PATTERNS[idx].slice();
}

function hasBadApple(lvl) { return lvl >= 3; }

function getSpeed(lvl) {
  return Math.max(60, 160 - (lvl - 1) * 12);
}

function init() {
  walls = getWalls(level);
  var mid = Math.floor(GRID / 2);
  snake = [{x:mid,y:mid},{x:mid-1,y:mid},{x:mid-2,y:mid},{x:mid-3,y:mid}];
  // Make sure start not on wall
  while (walls.some(function(w){ return snake.some(function(s){ return s.x===w.x&&s.y===w.y; }); })) {
    snake = snake.map(function(s){ return {x:s.x,y:s.y+1}; });
  }
  dir = {x:1, y:0};
  nextDir = {x:1, y:0};
  foodCount = 0;
  paused = false;
  running = false;
  badApple = null;
  placeFood();
  updateUI();
  draw();
}

function randomEmpty(extras) {
  var occupied = snake.concat(walls);
  if (food) occupied.push(food);
  if (badApple) occupied.push(badApple);
  if (extras) occupied = occupied.concat(extras);
  var p, tries = 0;
  do {
    p = {x: Math.floor(Math.random()*GRID), y: Math.floor(Math.random()*GRID)};
    tries++;
  } while (tries < 400 && occupied.some(function(s){ return s&&s.x===p.x&&s.y===p.y; }));
  return p;
}

function placeFood() {
  food = randomEmpty();
  if (hasBadApple(level)) {
    badApple = randomEmpty([food]);
  } else {
    badApple = null;
  }
}

function startLoop() {
  if (loopId) clearTimeout(loopId);
  (function tick() {
    if (!running || paused) return;
    step();
    loopId = setTimeout(tick, getSpeed(level));
  })();
}

function step() {
  dir = {x: nextDir.x, y: nextDir.y};
  var head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID) { gameOver(); return; }
  for (var i = 0; i < snake.length; i++) {
    if (snake[i].x===head.x && snake[i].y===head.y) { gameOver(); return; }
  }
  for (var w = 0; w < walls.length; w++) {
    if (walls[w].x===head.x && walls[w].y===head.y) { gameOver(); return; }
  }

  snake.unshift(head);

  if (head.x===food.x && head.y===food.y) {
    // Ate good food
    score += level * 10;
    foodCount++;
    // Level complete when snake reaches target length
    if (snake.length >= LEVEL_TARGET) {
      levelComplete();
      return;
    }
    placeFood();
  } else if (badApple && head.x===badApple.x && head.y===badApple.y) {
    // Ate bad apple — cut tail by 3
    var cut = Math.min(3, snake.length - 4);
    for (var c = 0; c < cut; c++) snake.pop();
    score = Math.max(0, score - level * 15);
    badApple = randomEmpty([food]);
    notify('Яд! -' + (level*15) + ' очков');
    // Don't remove tail again below
  } else {
    snake.pop();
  }

  updateUI();
  draw();
}

function levelComplete() {
  running = false;
  if (loopId) clearTimeout(loopId);

  level++;
  score += level * 100; // bonus for completing level

  if (level > 10) {
    // Won all levels!
    gameOver(true);
    return;
  }

  var lvlDescs = [
    '', '',
    'Появились стены!',
    'Ядовитое яблоко!',
    'Стены усложнились!',
    'Ещё сложнее!',
    'Спираль из стен!',
    'Шашечный узор!',
    'Сложный лабиринт!',
    'Плотные препятствия!',
    'ФИНАЛЬНЫЙ УРОВЕНЬ!'
  ];

  document.getElementById('lvlAnnTitle').textContent = 'УРОВЕНЬ ' + level;
  document.getElementById('lvlAnnSub').textContent = lvlDescs[level] || 'Новый уровень!';
  var ann = document.getElementById('lvlAnnounce');
  ann.classList.add('show');

  setTimeout(function() {
    ann.classList.remove('show');
    // Reset snake, place new walls
    init();
    // Restore score and level (init resets foodCount only)
    running = true;
    startLoop();
  }, 2200);

  updateUI();
}

function updateUI() {
  document.getElementById('sc').textContent = score;
  document.getElementById('best').textContent = Math.max(score, bestScore);
  document.getElementById('sLen').textContent = snake.length;
  document.getElementById('sLvl').textContent = level;
  document.getElementById('sGoal').textContent = LEVEL_TARGET;
  document.getElementById('sFood').textContent = foodCount;
  // Progress bar
  var pct = Math.min(100, Math.round((snake.length / LEVEL_TARGET) * 100));
  document.getElementById('progressFill').style.width = pct + '%';
}

// ---- Draw ----
function rr(x,y,w,h,r) {
  r = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

function draw() {
  var W = canvas.width, H = canvas.height;
  pulse += 0.07;

  ctx.fillStyle = '#0a0f1e';
  ctx.fillRect(0,0,W,H);

  // Grid
  for (var gx=0;gx<GRID;gx++) for (var gy=0;gy<GRID;gy++) {
    ctx.fillStyle = (gx+gy)%2===0 ? '#0c1422' : '#0a0f1e';
    ctx.fillRect(gx*CELL,gy*CELL,CELL,CELL);
  }

  // Walls
  walls.forEach(function(wl) {
    ctx.fillStyle = '#2a3a5a';
    rr(wl.x*CELL+1,wl.y*CELL+1,CELL-2,CELL-2,2);
    ctx.fill();
    ctx.fillStyle = '#1e2a42';
    ctx.fillRect(wl.x*CELL+CELL/2-0.5,wl.y*CELL+2,1,CELL-4);
    ctx.fillRect(wl.x*CELL+2,wl.y*CELL+CELL/2-0.5,CELL-4,1);
  });

  // Bad apple
  if (badApple) {
    ctx.shadowBlur = 12 + Math.sin(pulse*1.5)*3;
    ctx.shadowColor = '#aa00ff';
    ctx.fillStyle = '#cc44ff';
    rr(badApple.x*CELL+3,badApple.y*CELL+3,CELL-6,CELL-6,4);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.font = Math.floor(CELL*0.55)+'px serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.fillText('☠', badApple.x*CELL+CELL/2, badApple.y*CELL+CELL/2+1);
    ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  }

  // Food
  ctx.shadowBlur = 16 + Math.sin(pulse)*3;
  ctx.shadowColor = '#ff6b35';
  ctx.fillStyle = '#ff6b35';
  rr(food.x*CELL+3,food.y*CELL+3,CELL-6,CELL-6,4);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.beginPath();
  ctx.arc(food.x*CELL+CELL/2,food.y*CELL+CELL/2,CELL/7,0,Math.PI*2);
  ctx.fill();

  // Snake
  for (var i=0;i<snake.length;i++) {
    var seg = snake[i], isHead = i===0;
    var t = 1 - i/snake.length;
    var g = Math.floor(180+t*75);
    ctx.shadowBlur = isHead ? 16 : 0;
    ctx.shadowColor = '#00ff9d';
    ctx.fillStyle = isHead ? '#00ff9d' : ('rgb(0,'+g+','+Math.floor(t*100)+')');
    var p = isHead?1:2, s = CELL-p*2;
    rr(seg.x*CELL+p,seg.y*CELL+p,s,s,isHead?5:3);
    ctx.fill();
    if (isHead) {
      ctx.shadowBlur = 0; ctx.fillStyle = '#0a0f1e';
      var cx=seg.x*CELL+CELL/2, cy=seg.y*CELL+CELL/2;
      var eo=CELL*0.18, ea=CELL*0.14, er=CELL/7;
      ctx.beginPath(); ctx.arc(cx-dir.y*eo+dir.x*ea,cy-dir.x*eo+dir.y*ea,er,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx+dir.y*eo+dir.x*ea,cy+dir.x*eo+dir.y*ea,er,0,Math.PI*2); ctx.fill();
    }
  }
  ctx.shadowBlur = 0;
}

function animLoop() { draw(); requestAnimationFrame(animLoop); }

    snap.forEach(function(d){ items.push({id:d.id, ...d.data()}); });

    if (!items.length) {
      lbList.innerHTML = '<div class="lb-loading">Пока нет результатов — сыграй первым! 🎮</div>';
      return;
    }
    var medals = [
      '<svg width="20" height="20" viewBox="0 0 24 24" fill="#FFD700"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>',
      '<svg width="20" height="20" viewBox="0 0 24 24" fill="#C0C0C0"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>',
      '<svg width="20" height="20" viewBox="0 0 24 24" fill="#CD7F32"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>'
    ];
    var html = '';
    items.forEach(function(item, i) {
      var isMe = item.id === playerId;
      html +=
        '<div class="lb-item'+(isMe?' lb-you':'')+'">'+
        '<div class="lb-rank">'+(medals[i]||(i+1))+'</div>'+
        '<div class="lb-name">'+esc(item.name)+(isMe?' <span style="color:#00ff9d;font-size:10px">← ты</span>':'')+'</div>'+
        '<div class="lb-score">'+item.score+'</div>'+
        '<div class="lb-meta">Ур.'+item.level+'</div>'+
        '</div>';
    });
    lbList.innerHTML = html;
  } catch(e) {
    lbList.innerHTML = '<div class="lb-loading">Ошибка 😔<br><small style="color:#444">'+esc(e.message)+'</small></div>';
  }
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

document.getElementById('lbClose').onclick = function(){ document.getElementById('lbOverlay').classList.add('hidden'); };
document.getElementById('lbOpenBtn').onclick = openLeaderboard;
document.getElementById('lbMenuBtn').onclick = openLeaderboard;
document.getElementById('startBtn').onclick = startGame;

// ---- Pause ----
function togglePause() {
  if (!running) return;
  paused = !paused;
  document.getElementById('bPause').textContent = paused ? '▶' : '⏸';
  if (!paused) startLoop();
  notify(paused ? 'ПАУЗА' : 'ПРОДОЛЖАЕМ');
}
document.getElementById('bPause').onclick = togglePause;

// ---- Direction ----
function setDir(dx,dy) {
  if (!running||paused) return;
  if (dx===-dir.x&&dy===-dir.y) return;
  nextDir={x:dx,y:dy};
  try{window.Telegram.WebApp.HapticFeedback.selectionChanged();}catch(e){}
}
document.getElementById('bUp').onclick    = function(){ setDir(0,-1); };
document.getElementById('bDown').onclick  = function(){ setDir(0,1);  };
document.getElementById('bLeft').onclick  = function(){ setDir(-1,0); };
document.getElementById('bRight').onclick = function(){ setDir(1,0);  };

// ---- Keyboard ----
document.addEventListener('keydown', function(e) {
  switch(e.key) {
    case 'ArrowUp':   case 'w': e.preventDefault(); setDir(0,-1); break;
    case 'ArrowDown': case 's': e.preventDefault(); setDir(0,1);  break;
    case 'ArrowLeft': case 'a': e.preventDefault(); setDir(-1,0); break;
    case 'ArrowRight':case 'd': e.preventDefault(); setDir(1,0);  break;
    case ' ': case 'p': togglePause(); break;
    case 'Enter': if(!running) startGame(); break;
  }
});

// ---- Swipe ----
canvas.addEventListener('touchstart',function(e){ tx=e.touches[0].clientX; ty=e.touches[0].clientY; e.preventDefault(); },{passive:false});
canvas.addEventListener('touchend',function(e){
  var dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)<15&&Math.abs(dy)<15) return;
  if(Math.abs(dx)>Math.abs(dy)) setDir(dx>0?1:-1,0); else setDir(0,dy>0?1:-1);
  e.preventDefault();
},{passive:false});

// ---- Joystick ----
var useJoystick=false, joyActive=false, joyMaxR=68;
var joyEl=document.getElementById('joyEl'), joyStick=document.getElementById('joyStick'), dpadEl=document.getElementById('dpadEl');

document.getElementById('toggleDpad').onclick=function(){
  useJoystick=false; this.classList.add('active'); document.getElementById('toggleJoy').classList.remove('active');
  dpadEl.style.display='grid'; joyEl.style.display='none';
};
document.getElementById('toggleJoy').onclick=function(){
  useJoystick=true; this.classList.add('active'); document.getElementById('toggleDpad').classList.remove('active');
  dpadEl.style.display='none'; joyEl.style.display='block';
};

function joyMove(cx,cy){
  var rect=joyEl.getBoundingClientRect();
  var ox=rect.left+rect.width/2, oy=rect.top+rect.height/2;
  var dx=cx-ox, dy=cy-oy, dist=Math.sqrt(dx*dx+dy*dy);
  var clx=dx,cly=dy; if(dist>joyMaxR){clx=dx/dist*joyMaxR;cly=dy/dist*joyMaxR;}
  joyStick.style.transform='translate(calc(-50% + '+clx+'px), calc(-50% + '+cly+'px))';
  if(dist>18){if(Math.abs(dx)>Math.abs(dy)) setDir(dx>0?1:-1,0); else setDir(0,dy>0?1:-1);}
}
joyEl.addEventListener('touchstart',function(e){joyActive=true;joyMove(e.touches[0].clientX,e.touches[0].clientY);e.preventDefault();},{passive:false});
joyEl.addEventListener('touchmove',function(e){if(joyActive){joyMove(e.touches[0].clientX,e.touches[0].clientY);e.preventDefault();}},{passive:false});
joyEl.addEventListener('touchend',function(e){joyActive=false;joyStick.style.transform='translate(-50%,-50%)';e.preventDefault();},{passive:false});
joyEl.addEventListener('mousedown',function(e){joyActive=true;joyMove(e.clientX,e.clientY);});
window.addEventListener('mousemove',function(e){if(joyActive)joyMove(e.clientX,e.clientY);});
window.addEventListener('mouseup',function(){if(joyActive){joyActive=false;joyStick.style.transform='translate(-50%,-50%)';}});

// ---- Notify ----
function notify(msg){
  var el=document.getElementById('notif');
  el.textContent=msg; el.classList.add('show');
  setTimeout(function(){el.classList.remove('show');},1400);
}

// ---- Boot ----
level = 1; score = 0;
init();
animLoop();
</script>
</body>
</html>
