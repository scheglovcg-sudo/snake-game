*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:none}
:root{--g:#00FF9D;--bg:#000;--dim:#666;--faint:#999}
body{background:var(--bg);color:var(--g);font-family:'Hel','HelCyr',Arial,sans-serif;
      height:100dvh;display:flex;flex-direction:column;align-items:center;overflow:hidden;user-select:none}

/* NICK */
.nick-screen{position:fixed;inset:0;background:#000;z-index:100;
             display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:30px}
.nick-screen.hidden{display:none}
.nick-input{background:transparent;border:1.5px solid var(--g);color:var(--g);
            font-family:'Hel','HelCyr',Arial,sans-serif;font-size:15px;
            padding:10px 16px;width:100%;max-width:280px;text-align:center;outline:none;touch-action:auto}

/* HEADER */
.header{width:100%;display:flex;align-items:center;justify-content:space-between;
         padding:10px 14px 5px;flex-shrink:0}
.logo{display:flex;align-items:center;gap:7px;font-weight:700;font-size:15px;
       letter-spacing:1.5px;color:var(--g)}
.score-block{text-align:right;line-height:1.6}
.score-block .lbl{font-size:9px;color:var(--dim);letter-spacing:.5px}
.score-block .val{font-size:11px;color:var(--g);font-weight:700;letter-spacing:.5px}
/* SCORE bright, BEST dim — from SVG: SCORE=fil1=#00FF9D, BEST=fil8=#666 */
.score-block .best-val{color:var(--dim);font-weight:400}

/* CANVAS */
.canvas-wrap{position:relative;flex-shrink:0;display:flex;justify-content:center;width:100%}
canvas{display:block}

/* OVERLAY — populated by JS */
.overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:var(--bg);
          display:flex;flex-direction:column;align-items:center;justify-content:center;
          gap:10px;z-index:10}
.overlay.hidden{display:none}
.overlay.no-bg{background:transparent}
.ov-icon{display:flex;align-items:center;justify-content:center}
.ov-title{font-size:11px;font-weight:400;color:var(--dim);letter-spacing:1.5px;text-transform:uppercase}
.ov-score{font-size:46px;font-weight:700;color:var(--g);line-height:1}
.ov-sub{font-size:11px;color:var(--dim);text-align:center;line-height:1.7}
.ov-best{font-size:11px;color:var(--dim)}

/* BUTTONS — .btn = filled green, .btn2 = outline */
.btn{background:linear-gradient(to right, aqua, #00FF9D);color:#1A1A1A;border:none;
      padding:11px 0;width:172px;
      font-family:'Hel','HelCyr',Arial,sans-serif;font-weight:700;font-size:14px;
      cursor:pointer;letter-spacing:.5px;border-radius:0}
.btn:active{opacity:.85}
.btn2{background:#1A1A1A;color:#00FFFD;border:1.5px solid #00FFFD;
       padding:10px 0;width:172px;
       font-family:'Hel','HelCyr',Arial,sans-serif;font-weight:400;font-size:13px;
       cursor:pointer;letter-spacing:.5px;border-radius:0}
.btn2:active{opacity:.7}
/* nick screen uses same filled style */
.btn-primary{background:linear-gradient(to right, aqua, #00FF9D);color:#1A1A1A;border:none;
              padding:11px 0;width:172px;
              font-family:'Hel','HelCyr',Arial,sans-serif;font-weight:700;font-size:14px;
              cursor:pointer;letter-spacing:.5px;border-radius:0}
.btn-primary:active{opacity:.85}

/* PROGRESS — gradient from SVG */
.progress-wrap{width:100%;flex-shrink:0}
.progress-bg{background:#1A1A1A;height:3px}
.progress-fill{height:100%;background:linear-gradient(to right, aqua, #00FF9D);transition:width .3s}

/* STATS — fil11=#999 */
.stats{display:flex;align-items:center;justify-content:space-between;
        width:100%;padding:5px 14px 2px;flex-shrink:0}
.stat{font-size:10px;color:var(--faint);letter-spacing:.3px}

/* DPAD — fil3 bg=#1A1A1A squares, arrows fil8=#666 */
.dpad{display:grid;grid-template-columns:56px 56px 56px;grid-template-rows:56px 56px 56px;
       gap:2px;padding:4px 0 2px;flex-shrink:0}
.db{background:#1A1A1A;display:flex;align-items:center;justify-content:center;
     font-size:18px;cursor:pointer;color:#666}
.db:active,.db.pressed{background:#2a2a2a;color:var(--g)}
.dc{background:#1A1A1A;display:flex;align-items:center;justify-content:center;
     font-size:15px;cursor:pointer;color:#444}
.dc:active{color:#666}

/* JOYSTICK */
.joystick-wrap{width:180px;height:180px;position:relative;display:none;flex-shrink:0;margin:4px 0 2px}
.joystick-base{position:absolute;inset:0;border-radius:50%;background:#1A1A1A}
.joystick-stick{position:absolute;width:60px;height:60px;border-radius:50%;background:#333;
                 top:50%;left:50%;transform:translate(-50%,-50%);cursor:pointer}

/* BOTTOM BAR — D-PAD active=fil10=#4D4D4D, inactive=fil8=#666 */
.bottom-bar{display:flex;align-items:center;justify-content:center;gap:22px;
             padding:2px 14px 8px;flex-shrink:0;width:100%}
.toggle-btn{font-size:10px;color:var(--dim);cursor:pointer;border:none;background:transparent;
             letter-spacing:1px;padding:4px 2px;font-family:'Hel','HelCyr',Arial,sans-serif}
.toggle-btn.active{color:#4D4D4D}

/* LEADERBOARD */
.lb-overlay{position:fixed;inset:0;background:#000;z-index:50;
             display:flex;flex-direction:column;align-items:center;padding:20px 16px 16px;overflow-y:auto}
.lb-overlay.hidden{display:none}
.lb-title{font-size:12px;font-weight:700;color:var(--g);letter-spacing:2px;margin-bottom:16px}
.lb-list{width:100%;max-width:360px;display:flex;flex-direction:column;margin-bottom:16px}
.lb-item{display:flex;align-items:center;gap:10px;padding:10px 4px;border-bottom:1px solid #1a1a1a;font-size:12px}
.lb-rank{min-width:24px;color:var(--dim);font-size:11px}
.lb-name{flex:1;color:#ccc;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-score{font-size:14px;font-weight:700;color:var(--g)}
.lb-meta{font-size:10px;color:#444;min-width:36px;text-align:right}
.lb-you .lb-name{color:var(--g)}
.lb-loading{color:#444;font-size:12px;margin:30px 0;text-align:center}

/* LEVEL ANNOUNCE */
.lvl-announce{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
               justify-content:center;background:rgba(0,0,0,.88);z-index:30;
               pointer-events:none;opacity:0;transition:opacity .3s}
.lvl-announce.show{opacity:1}
.lvl-ann-title{font-size:22px;font-weight:700;color:var(--g);letter-spacing:3px}
.lvl-ann-sub{font-size:11px;color:var(--dim);margin-top:6px;text-align:center}

/* NOTIF */
.notif{position:fixed;top:52px;left:50%;transform:translateX(-50%) translateY(-8px);
        background:#1a1a1a;color:var(--g);font-size:11px;font-weight:700;
        padding:7px 16px;opacity:0;pointer-events:none;transition:all .25s;
        white-space:nowrap;z-index:99;letter-spacing:1px}
.notif.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

<!-- HIDDEN STUBS for JS static bindings at module load
     JS does: getElementById('startBtn').onclick  -> exists in showMenu innerHTML, but

     so it MUST exist in the DOM at load time -->
<button id="startBtn"  style="display:none"></button>
<button id="lbMenuBtn" style="display:none"></button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, collection, getDocs, query, orderBy, limit }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCIRnqzjfVSnf7jUhbI3WZcRl2ABpCEsZ4",
  authDomain: "snake-game-1376f.firebaseapp.com",
  projectId: "snake-game-1376f",
  storageBucket: "snake-game-1376f.firebasestorage.app",
  messagingSenderId: "339740336362",
  appId: "1:339740336362:web:ed4091ca6e52d0ddf57793"
};

var fbApp = initializeApp(firebaseConfig);
var db = getFirestore(fbApp);

// ---- Player ID & Nickname ----
// Unique player ID stored locally
var playerId = localStorage.getItem('snakePlayerId');
if (!playerId) {
  playerId = 'p_' + Date.now() + '_' + Math.floor(Math.random()*99999);
  localStorage.setItem('snakePlayerId', playerId);
}

var playerName = localStorage.getItem('snakePlayerName');

// Show nickname screen if no name saved
var nickScreen = document.getElementById('nickScreen');
if (!playerName) {
  nickScreen.classList.remove('hidden');
} else {
  nickScreen.classList.add('hidden');
}

document.getElementById('nickBtn').onclick = function() {
  var val = document.getElementById('nickInput').value.trim();
  if (!val) { notify('Введи имя!'); return; }
  playerName = val;
  localStorage.setItem('snakePlayerName', playerName);
  nickScreen.classList.add('hidden');
};

document.getElementById('nickInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('nickBtn').click();
});

// ---- Canvas ----
var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var GRID = 20;
var CELL = 16;

function setupCanvas() {
  var maxW = canvas.parentElement.clientWidth - 20;
  var maxH = window.innerHeight
    - document.querySelector('.header').offsetHeight
    - document.querySelector('.stats').offsetHeight
    - document.querySelector('.progress-wrap').offsetHeight
    - 230;
  var size = Math.min(maxW, maxH, 380);
  CELL = Math.floor(size / GRID);
  canvas.width  = CELL * GRID;
  canvas.height = CELL * GRID;
}
setupCanvas();

// ---- Constants ----
var TOTAL_CELLS = GRID * GRID; // 400
var LEVEL_TARGET = 75; // snake length to complete level

// Wall layouts per level (0-indexed, level 1 = index 0 = no walls)
// Each entry is array of {x,y} segments
var WALL_PATTERNS = [
  // Level 1: no walls
  [],
  // Level 2: short cross in center
  (function() {
    var w = []; var cx = 10, cy = 10;
    for (var i=-2;i<=2;i++) { w.push({x:cx+i,y:cy}); w.push({x:cx,y:cy+i}); }
    return w;
  })(),
  // Level 3: four corner blocks
  (function() {
    var w = [];
    var corners = [{x:3,y:3},{x:16,y:3},{x:3,y:16},{x:16,y:16}];
    corners.forEach(function(c) {
      for (var dx=0;dx<3;dx++) for(var dy=0;dy<3;dy++) w.push({x:c.x+dx,y:c.y+dy});
    });
    return w;
  })(),
  // Level 4: two horizontal bars
  (function() {
    var w = [];
    for (var i=4;i<=15;i++) { w.push({x:i,y:6}); w.push({x:i,y:13}); }
    return w;
  })(),
  // Level 5: maze-like inner walls
  (function() {
    var w = [];
    for (var i=3;i<=8;i++) w.push({x:i,y:5});
    for (var i=5;i<=10;i++) w.push({x:3,y:i});
    for (var i=11;i<=16;i++) w.push({x:i,y:14});
    for (var i=9;i<=14;i++) w.push({x:16,y:i});
    return w;
  })(),
  // Level 6: spiral-ish
  (function() {
    var w = [];
    for (var i=2;i<=17;i++) w.push({x:i,y:2});
    for (var i=2;i<=15;i++) w.push({x:17,y:i});
    for (var i=4;i<=17;i++) w.push({x:i,y:17});
    for (var i=4;i<=17;i++) w.push({x:2,y:i});
    for (var i=5;i<=14;i++) w.push({x:i,y:5});
    for (var i=5;i<=12;i++) w.push({x:14,y:i});
    return w;
  })(),
  // Level 7: checkerboard blocks
  (function() {
    var w = [];
    var pts = [{x:4,y:4},{x:4,y:10},{x:4,y:15},{x:10,y:7},{x:10,y:14},{x:15,y:4},{x:15,y:10}];
    pts.forEach(function(p){ for(var dx=0;dx<2;dx++) for(var dy=0;dy<2;dy++) w.push({x:p.x+dx,y:p.y+dy}); });
    return w;
  })(),
  // Level 8: complex maze
  (function() {
    var w = [];
    for(var i=1;i<=18;i++) w.push({x:i,y:1},{x:i,y:18});
    for(var i=1;i<=18;i++) w.push({x:1,y:i},{x:18,y:i});
    for(var i=4;i<=15;i++) w.push({x:i,y:9});
    for(var i=4;i<=9;i++) w.push({x:4,y:i});
    for(var i=10;i<=15;i++) w.push({x:15,y:i});
    return w;
  })(),
  // Level 9: dense obstacles
  (function() {
    var w = [];
    var pts = [{x:5,y:5},{x:5,y:10},{x:5,y:15},{x:10,y:3},{x:10,y:10},{x:10,y:17},{x:15,y:5},{x:15,y:10},{x:15,y:15}];
    pts.forEach(function(p){ for(var dx=0;dx<2;dx++) for(var dy=0;dy<2;dy++) w.push({x:p.x+dx,y:p.y+dy}); });
    for(var i=3;i<=17;i++) { if(i!==10) w.push({x:i,y:1},{x:i,y:18},{x:1,y:i},{x:18,y:i}); }
    return w;
  })(),
  // Level 10: hardest — full border + inner cross
  (function() {
    var w = [];
    for(var i=0;i<20;i++) { w.push({x:i,y:0}); w.push({x:i,y:19}); w.push({x:0,y:i}); w.push({x:19,y:i}); }
    for(var i=3;i<=16;i++) { w.push({x:i,y:9}); w.push({x:9,y:i}); }
    return w;
  })()
];

// ---- Game State ----
var snake, dir, nextDir, food, badApple, walls;
var score, bestScore, foodCount, level, paused, running, loopId;
var pulse = 0;
var tx = 0, ty = 0;

bestScore = parseInt(localStorage.getItem('snakeBest') || '0');
document.getElementById('best').textContent = bestScore;

function getWalls(lvl) {
  var idx = Math.min(lvl - 1, WALL_PATTERNS.length - 1);
  return WALL_PATTERNS[idx].slice();
}

function hasBadApple(lvl) { return lvl >= 3; }

function getSpeed(lvl) {
  return Math.max(60, 160 - (lvl - 1) * 12);
}

function init() {
  walls = getWalls(level);
  var mid = Math.floor(GRID / 2);
  snake = [{x:mid,y:mid},{x:mid-1,y:mid},{x:mid-2,y:mid},{x:mid-3,y:mid}];
  // Make sure start not on wall
  while (walls.some(function(w){ return snake.some(function(s){ return s.x===w.x&&s.y===w.y; }); })) {
    snake = snake.map(function(s){ return {x:s.x,y:s.y+1}; });
  }
  dir = {x:1, y:0};
  nextDir = {x:1, y:0};
  foodCount = 0;
  paused = false;
  running = false;
  badApple = null;
  placeFood();
  updateUI();
  draw();
}

function randomEmpty(extras) {
  var occupied = snake.concat(walls);
  if (food) occupied.push(food);
  if (badApple) occupied.push(badApple);
  if (extras) occupied = occupied.concat(extras);
  var p, tries = 0;
  do {
    p = {x: Math.floor(Math.random()*GRID), y: Math.floor(Math.random()*GRID)};
    tries++;
  } while (tries < 400 && occupied.some(function(s){ return s&&s.x===p.x&&s.y===p.y; }));
  return p;
}

function placeFood() {
  food = randomEmpty();
  if (hasBadApple(level)) {
    badApple = randomEmpty([food]);
  } else {
    badApple = null;
  }
}

function startLoop() {
  if (loopId) clearTimeout(loopId);
  (function tick() {
    if (!running || paused) return;
    step();
    loopId = setTimeout(tick, getSpeed(level));
  })();
}

function step() {
  dir = {x: nextDir.x, y: nextDir.y};
  var head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID) { gameOver(); return; }
  for (var i = 0; i < snake.length; i++) {
    if (snake[i].x===head.x && snake[i].y===head.y) { gameOver(); return; }
  }
  for (var w = 0; w < walls.length; w++) {
    if (walls[w].x===head.x && walls[w].y===head.y) { gameOver(); return; }
  }

  snake.unshift(head);

  if (head.x===food.x && head.y===food.y) {
    // Ate good food
    score += level * 10;
    foodCount++;
    // Level complete when snake reaches target length
    if (snake.length >= LEVEL_TARGET) {
      levelComplete();
      return;
    }
    placeFood();
  } else if (badApple && head.x===badApple.x && head.y===badApple.y) {
    // Ate bad apple — cut tail by 3
    var cut = Math.min(3, snake.length - 4);
    for (var c = 0; c < cut; c++) snake.pop();
    score = Math.max(0, score - level * 15);
    badApple = randomEmpty([food]);
    notify('Яд! -' + (level*15) + ' очков');
    // Don't remove tail again below
  } else {
    snake.pop();
  }

  updateUI();
  draw();
}

function levelComplete() {
  running = false;
  if (loopId) clearTimeout(loopId);

  level++;
  score += level * 100; // bonus for completing level

  if (level > 10) {
    // Won all levels!
    gameOver(true);
    return;
  }

  var lvlDescs = [
    '', '',
    'Появились стены!',
    'Ядовитое яблоко!',
    'Стены усложнились!',
    'Ещё сложнее!',
    'Спираль из стен!',
    'Шашечный узор!',
    'Сложный лабиринт!',
    'Плотные препятствия!',
    'ФИНАЛЬНЫЙ УРОВЕНЬ!'
  ];

  document.getElementById('lvlAnnTitle').textContent = 'УРОВЕНЬ ' + level;
  document.getElementById('lvlAnnSub').textContent = lvlDescs[level] || 'Новый уровень!';
  var ann = document.getElementById('lvlAnnounce');
  ann.classList.add('show');

  setTimeout(function() {
    ann.classList.remove('show');
    // Reset snake, place new walls
    init();
    // Restore score and level (init resets foodCount only)
    running = true;
    startLoop();
  }, 2200);

  updateUI();
}

function updateUI() {
  document.getElementById('sc').textContent = score;
  document.getElementById('best').textContent = Math.max(score, bestScore);
  document.getElementById('sLen').textContent = snake.length;
  document.getElementById('sLvl').textContent = level;
  document.getElementById('sGoal').textContent = LEVEL_TARGET;
  document.getElementById('sFood').textContent = foodCount;
  // Progress bar
  var pct = Math.min(100, Math.round((snake.length / LEVEL_TARGET) * 100));
  document.getElementById('progressFill').style.width = pct + '%';
}

// ---- Draw ----
function draw() {
  var W = canvas.width, H = canvas.height;
  pulse += 0.07;

  ctx.fillStyle = '#0a0f1e';
  ctx.fillRect(0,0,W,H);

  // Grid
  for (var gx=0;gx<GRID;gx++) for (var gy=0;gy<GRID;gy++) {
    ctx.fillStyle = (gx+gy)%2===0 ? '#0c1422' : '#0a0f1e';
    ctx.fillRect(gx*CELL,gy*CELL,CELL,CELL);
  }

  // Walls — sharp squares, full cell
  walls.forEach(function(wl) {
    ctx.fillStyle = '#2a3a5a';
    ctx.fillRect(wl.x*CELL, wl.y*CELL, CELL, CELL);
    // subtle inner cross detail
    ctx.fillStyle = '#1e2a42';
    ctx.fillRect(wl.x*CELL+CELL/2-0.5, wl.y*CELL+2, 1, CELL-4);
    ctx.fillRect(wl.x*CELL+2, wl.y*CELL+CELL/2-0.5, CELL-4, 1);
  });

  // Bad apple — circle with pixel skull
  if (badApple) {
    var bx = badApple.x*CELL+CELL/2, by = badApple.y*CELL+CELL/2, br = CELL/2-1;
    ctx.fillStyle = '#cc44ff';
    ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI*2); ctx.fill();
    // pixel skull: eyes
    var ps = Math.max(1, Math.floor(CELL/8));
    ctx.fillStyle = '#0a0f1e';
    ctx.fillRect(bx-ps*1.5-ps/2, by-ps, ps, ps);
    ctx.fillRect(bx+ps*0.5, by-ps, ps, ps);
    ctx.fillRect(bx-ps*1.5, by+ps*0.5, ps, ps);
    ctx.fillRect(bx+ps*0.5, by+ps*0.5, ps, ps);
  }

  // Food — circle
  var fx = food.x*CELL+CELL/2, fy = food.y*CELL+CELL/2, fr = CELL/2-2;
  ctx.fillStyle = '#ff6b35';
  ctx.beginPath(); ctx.arc(fx, fy, fr, 0, Math.PI*2); ctx.fill();
  // shine dot
  ctx.fillStyle = 'rgba(255,255,255,0.75)';
  ctx.beginPath(); ctx.arc(fx - fr*0.28, fy - fr*0.28, fr*0.22, 0, Math.PI*2); ctx.fill();

  // Snake — sharp squares, full cell, no padding
  for (var i=0;i<snake.length;i++) {
    var seg = snake[i], isHead = i===0;
    var t = 1 - i/snake.length;
    var g = Math.floor(155+t*100);
    ctx.fillStyle = isHead ? '#00ff9d' : ('rgb(0,'+g+','+Math.floor(t*80)+')');
    ctx.fillRect(seg.x*CELL, seg.y*CELL, CELL, CELL);
    if (isHead) {
      // Square eyes, 1px size, flush to the leading edge, on the sides
      var es = Math.max(1, Math.round(CELL / 8)); // eye size: 1 pixel unit
      ctx.fillStyle = '#0a0f1e';
      // Leading edge offset: 0 from front, side offset: 1px from edge
      // eye1 and eye2 positions depend on direction
      var e1x, e1y, e2x, e2y;
      if (dir.x === 1) {       // moving right — eyes on right edge, top & bottom
        e1x = seg.x*CELL + CELL - es; e1y = seg.y*CELL + es;
        e2x = seg.x*CELL + CELL - es; e2y = seg.y*CELL + CELL - es*2;
      } else if (dir.x === -1) { // moving left — eyes on left edge
        e1x = seg.x*CELL;          e1y = seg.y*CELL + es;
        e2x = seg.x*CELL;          e2y = seg.y*CELL + CELL - es*2;
      } else if (dir.y === -1) { // moving up — eyes on top edge, left & right
        e1x = seg.x*CELL + es;          e1y = seg.y*CELL;
        e2x = seg.x*CELL + CELL - es*2; e2y = seg.y*CELL;
      } else {                   // moving down — eyes on bottom edge
        e1x = seg.x*CELL + es;          e1y = seg.y*CELL + CELL - es;
        e2x = seg.x*CELL + CELL - es*2; e2y = seg.y*CELL + CELL - es;
      }
      ctx.fillRect(e1x, e1y, es, es);
      ctx.fillRect(e2x, e2y, es, es);
    }
  }
}

function animLoop() { draw(); requestAnimationFrame(animLoop); }

// ---- Game Over ----
async function gameOver(won) {

      var ref = doc(db, 'leaderboard', playerId);

function startGame() {
  if (!playerName) { notify('Введи имя сначала!'); nickScreen.classList.remove('hidden'); return; }

// ---- Leaderboard ----
async function openLeaderboard() {
  var lbOverlay = document.getElementById('lbOverlay');
  var lbList = document.getElementById('lbList');
  lbOverlay.classList.remove('hidden');
  lbList.innerHTML = '<div class="lb-loading">Загрузка...</div>';
  try {
    var q = query(collection(db, 'leaderboard'), orderBy('score','desc'), limit(10));
    var snap = await getDocs(q);
    var items = [];
    snap.forEach(function(d){ items.push({id:d.id, ...d.data()}); });

    if (!items.length) {
      lbList.innerHTML = '<div class="lb-loading">Пока нет результатов — сыграй первым! 🎮</div>';
      return;
    }
    var medals = [
      '<svg width="20" height="20" viewBox="0 0 24 24" fill="#FFD700"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>',
      '<svg width="20" height="20" viewBox="0 0 24 24" fill="#C0C0C0"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>',
      '<svg width="20" height="20" viewBox="0 0 24 24" fill="#CD7F32"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>'
    ];
    var html = '';
    items.forEach(function(item, i) {
      var isMe = item.id === playerId;
      html +=
        '<div class="lb-item'+(isMe?' lb-you':'')+'">'+
        '<div class="lb-rank">'+(medals[i]||(i+1))+'</div>'+
        '<div class="lb-name">'+esc(item.name)+(isMe?' <span style="color:#00ff9d;font-size:10px">← ты</span>':'')+'</div>'+
        '<div class="lb-score">'+item.score+'</div>'+
        '<div class="lb-meta">Ур.'+item.level+'</div>'+
        '</div>';
    });
    lbList.innerHTML = html;
  } catch(e) {
    lbList.innerHTML = '<div class="lb-loading">Ошибка 😔<br><small style="color:#444">'+esc(e.message)+'</small></div>';
  }
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

document.getElementById('lbClose').onclick = function(){ document.getElementById('lbOverlay').classList.add('hidden'); };
document.getElementById('lbOpenBtn').onclick = openLeaderboard;
document.getElementById('lbMenuBtn').onclick = openLeaderboard;
document.getElementById('startBtn').onclick = startGame;

// ---- Pause ----
function togglePause() {
  if (!running) return;
  paused = !paused;
  document.getElementById('bPause').textContent = paused ? '▶' : '⏸';
  if (!paused) startLoop();
  notify(paused ? 'ПАУЗА' : 'ПРОДОЛЖАЕМ');
}
document.getElementById('bPause').onclick = togglePause;

// ---- Direction ----
function setDir(dx,dy) {
  if (!running||paused) return;
  if (dx===-dir.x&&dy===-dir.y) return;
  nextDir={x:dx,y:dy};
  try{window.Telegram.WebApp.HapticFeedback.selectionChanged();}catch(e){}
}
document.getElementById('bUp').onclick    = function(){ setDir(0,-1); };
document.getElementById('bDown').onclick  = function(){ setDir(0,1);  };
document.getElementById('bLeft').onclick  = function(){ setDir(-1,0); };
document.getElementById('bRight').onclick = function(){ setDir(1,0);  };

// ---- Keyboard ----
document.addEventListener('keydown', function(e) {
  switch(e.key) {
    case 'ArrowUp':   case 'w': e.preventDefault(); setDir(0,-1); break;
    case 'ArrowDown': case 's': e.preventDefault(); setDir(0,1);  break;
    case 'ArrowLeft': case 'a': e.preventDefault(); setDir(-1,0); break;
    case 'ArrowRight':case 'd': e.preventDefault(); setDir(1,0);  break;
    case ' ': case 'p': togglePause(); break;
    case 'Enter': if(!running) startGame(); break;
  }
});

// ---- Swipe ----
canvas.addEventListener('touchstart',function(e){ tx=e.touches[0].clientX; ty=e.touches[0].clientY; e.preventDefault(); },{passive:false});
canvas.addEventListener('touchend',function(e){
  var dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)<15&&Math.abs(dy)<15) return;
  if(Math.abs(dx)>Math.abs(dy)) setDir(dx>0?1:-1,0); else setDir(0,dy>0?1:-1);
  e.preventDefault();
},{passive:false});

// ---- Joystick ----
var useJoystick=false, joyActive=false, joyMaxR=68;
var joyEl=document.getElementById('joyEl'), joyStick=document.getElementById('joyStick'), dpadEl=document.getElementById('dpadEl');

document.getElementById('toggleDpad').onclick=function(){
  useJoystick=false; this.classList.add('active'); document.getElementById('toggleJoy').classList.remove('active');
  dpadEl.style.display='grid'; joyEl.style.display='none';
};
document.getElementById('toggleJoy').onclick=function(){
  useJoystick=true; this.classList.add('active'); document.getElementById('toggleDpad').classList.remove('active');
  dpadEl.style.display='none'; joyEl.style.display='block';
};

function joyMove(cx,cy){
  var rect=joyEl.getBoundingClientRect();
  var ox=rect.left+rect.width/2, oy=rect.top+rect.height/2;
  var dx=cx-ox, dy=cy-oy, dist=Math.sqrt(dx*dx+dy*dy);
  var clx=dx,cly=dy; if(dist>joyMaxR){clx=dx/dist*joyMaxR;cly=dy/dist*joyMaxR;}
  joyStick.style.transform='translate(calc(-50% + '+clx+'px), calc(-50% + '+cly+'px))';
  if(dist>18){if(Math.abs(dx)>Math.abs(dy)) setDir(dx>0?1:-1,0); else setDir(0,dy>0?1:-1);}
}
joyEl.addEventListener('touchstart',function(e){joyActive=true;joyMove(e.touches[0].clientX,e.touches[0].clientY);e.preventDefault();},{passive:false});
joyEl.addEventListener('touchmove',function(e){if(joyActive){joyMove(e.touches[0].clientX,e.touches[0].clientY);e.preventDefault();}},{passive:false});
joyEl.addEventListener('touchend',function(e){joyActive=false;joyStick.style.transform='translate(-50%,-50%)';e.preventDefault();},{passive:false});
joyEl.addEventListener('mousedown',function(e){joyActive=true;joyMove(e.clientX,e.clientY);});
window.addEventListener('mousemove',function(e){if(joyActive)joyMove(e.clientX,e.clientY);});
window.addEventListener('mouseup',function(){if(joyActive){joyActive=false;joyStick.style.transform='translate(-50%,-50%)';}});

// ---- Notify ----
function notify(msg){
  var el=document.getElementById('notif');
  el.textContent=msg; el.classList.add('show');
  setTimeout(function(){el.classList.remove('show');},1400);
}

// ---- Boot ----
level = 1; score = 0;
init();
animLoop();
</script>
